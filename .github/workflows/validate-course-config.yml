name: Validate summer course automation data

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/course-manifest.json"
      - ".github/labels.json"
      - ".github/roadmap.json"
      - ".github/scripts/validate-course-config.cjs"
      - ".github/workflows/validate-course-config.yml"
      - "02-labs/**"
      - "03-capstone/**"
  push:
    paths:
      - ".github/course-manifest.json"
      - ".github/labels.json"
      - ".github/roadmap.json"
      - ".github/scripts/validate-course-config.cjs"
      - ".github/workflows/validate-course-config.yml"
      - "02-labs/**"
      - "03-capstone/**"

permissions:
  contents: read

concurrency:
  group: validate-summer-course-data-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out the course repository
        uses: actions/checkout@v6

      - name: Validate the manifest, labels, roadmap, and instruction paths
        run: node .github/scripts/validate-course-config.cjs
